---
- name: Update NetBox with lab devices
  hosts: localhost
  gather_facts: false

  vars:
    netbox_url: "http://10.20.20.21:8080"
    netbox_token: "{{ lookup('env', 'NETBOX_TOKEN') }}"

  tasks:
    - name: Create HomeLab site
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/dcim/sites/"
        method: POST
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "HomeLab"
          slug: "homelab"
        status_code: [200, 201, 400]

    - name: Show result
      ansible.builtin.debug:
        msg: "NetBox HomeLab site check complete"
