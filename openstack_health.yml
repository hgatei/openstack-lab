---
- name: OpenStack Service Health Check
  hosts: all
  become: yes
  gather_facts: no

  tasks:
    - name: Check Nova API
      ansible.builtin.shell: systemctl is-active devstack@n-api || true
      register: nova_api
      changed_when: false

    - name: Check Nova Scheduler
      ansible.builtin.shell: systemctl is-active devstack@n-sch || true
      register: nova_sched
      changed_when: false

    - name: Check Neutron services
      ansible.builtin.shell: |
        systemctl list-units "devstack@neutron-*" "devstack@q-*" --type=service --no-pager --plain | awk '/devstack@/ {print $1, $3, $4}'
      register: neutron_services
      changed_when: false

    - name: Display OpenStack health status
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Nova API: {{ nova_api.stdout }}"
          - "Nova Scheduler: {{ nova_sched.stdout }}"
          - "Neutron/OVN Services:"
          - "{{ neutron_services.stdout_lines }}"
